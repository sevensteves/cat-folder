version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - misspell
    - godot
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - (*os.File).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
